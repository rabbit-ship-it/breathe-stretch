<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    body {
      margin: 0;
      padding: 16px;
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    h2 {
      font-size: 14px;
      font-weight: 700;
      margin: 0 0 4px;
      color: #f1f5f9;
    }
    p {
      font-size: 12px;
      color: #64748b;
      margin: 0 0 14px;
      line-height: 1.4;
    }
    button {
      width: 100%;
      padding: 10px 0;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    #testBtn {
      background: #38bdf8;
      color: #0f172a;
    }
    #optionsBtn {
      background: #1e293b;
      color: #94a3b8;
      margin-top: 8px;
      border: 1px solid rgba(255,255,255,0.07);
    }
  </style>
</head>
<body>
  <h2>🧘 Breathe & Stretch</h2>
  <p id="statsLine" style="color:#38bdf8;font-weight:600;margin-bottom:4px;font-size:13px;"></p>
  <p>Next break in ~20 min.<br/>Or trigger one right now:</p>
  <button id="testBtn">Preview Break</button>
  <button id="optionsBtn">⚙ Customize &amp; Stats</button>
  <script src="popup.js"></script>
</body>
</html>
